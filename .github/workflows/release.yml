name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build release binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: make cross VERSION="$VERSION"

      - name: Generate sha256sums.txt
        run: |
          cd dist
          sha256sum \
            guest-tunnel-darwin-amd64 \
            guest-tunnel-darwin-arm64 \
            guest-tunnel-linux-amd64 \
            guest-tunnel-linux-arm64 \
            fido2-agent-darwin-amd64 \
            fido2-agent-darwin-arm64 \
            fido2-agent-linux-amd64 \
            fido2-agent-linux-arm64 \
            > sha256sums.txt
          cat sha256sums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/guest-tunnel-darwin-amd64
            dist/guest-tunnel-darwin-arm64
            dist/guest-tunnel-linux-amd64
            dist/guest-tunnel-linux-arm64
            dist/fido2-agent-darwin-amd64
            dist/fido2-agent-darwin-arm64
            dist/fido2-agent-linux-amd64
            dist/fido2-agent-linux-arm64
            dist/sha256sums.txt
