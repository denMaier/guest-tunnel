name: Build SSH with FIDO2

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    name: ${{ matrix.os }}-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            container: debian:bookworm-slim
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
            container: ''
          - os: darwin
            arch: amd64
            runner: macos-15-intel
            container: ''
          - os: darwin
            arch: arm64
            runner: macos-26
            container: ''

    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}

    steps:
      - name: Install Linux build dependencies
        if: matrix.os == 'linux' && matrix.container == ''
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential libssl-dev zlib1g-dev \
            autoconf automake libtool \
            libfido2-dev libcbor-dev git

      - name: Install Debian build dependencies
        if: matrix.os == 'linux' && matrix.container != ''
        run: |
          apt-get update -qq
          apt-get install -y \
            build-essential libssl-dev zlib1g-dev \
            autoconf automake libtool \
            libfido2-dev libcbor-dev git

      - name: Clone OpenSSH portable
        run: git clone --depth 1 -b V_9_8_P1 https://github.com/openssh/openssh-portable.git

      - name: autoreconf
        working-directory: openssh-portable
        run: autoreconf

      - name: Configure (Linux)
        if: matrix.os == 'linux'
        working-directory: openssh-portable
        run: |
          ./configure \
            --with-security-key-builtin=yes \
            --without-ssh1 \
            --disable-wtmp --disable-utmp \
            --disable-libedit \
            --disable-kerberos5 \
            --disable-gssapi-with-mic \
            --disable-pam \
            --disable-rpath \
            LDFLAGS="-static-libgcc -static-libstdc++"

      - name: Install macOS build dependencies
        if: matrix.os == 'darwin'
        run: brew install autoconf automake libtool openssl@3 libfido2

      - name: Configure (macOS)
        if: matrix.os == 'darwin'
        working-directory: openssh-portable
        run: |
          OPENSSL_PREFIX=$(brew --prefix openssl)
          FIDO2_PREFIX=$(brew --prefix libfido2)
          ./configure \
            --with-security-key-builtin=yes \
            --without-ssh1 \
            --disable-wtmp --disable-utmp \
            --disable-libedit \
            --disable-kerberos5 \
            --disable-gssapi-with-mic \
            --disable-pam \
            --disable-rpath \
            --with-ssl-dir="$OPENSSL_PREFIX" \
            CPPFLAGS="-I${OPENSSL_PREFIX}/include -I${FIDO2_PREFIX}/include" \
            LDFLAGS="-L${OPENSSL_PREFIX}/lib -L${FIDO2_PREFIX}/lib"

      - name: Build
        working-directory: openssh-portable
        run: make -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu) ssh

      - name: Strip binary (Linux)
        if: matrix.os == 'linux'
        working-directory: openssh-portable
        run: strip --strip-all ssh

      - name: Strip binary (macOS)
        if: matrix.os == 'darwin'
        working-directory: openssh-portable
        run: strip -S ssh

      - name: Rename binary
        working-directory: openssh-portable
        run: mv ssh ssh-fido2-${{ matrix.os }}-${{ matrix.arch }}

      - name: Verify FIDO2 support
        working-directory: openssh-portable
        run: |
          ./ssh-fido2-${{ matrix.os }}-${{ matrix.arch }} -Q key \
            | grep -E "sk-ssh-(ed25519|ecdsa)" \
            || { echo "ERROR: FIDO2 key types not found — build is broken"; exit 1; }
          echo "FIDO2 verification passed"
          ls -lh ssh-fido2-${{ matrix.os }}-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ssh-fido2-${{ matrix.os }}-${{ matrix.arch }}
          path: openssh-portable/ssh-fido2-${{ matrix.os }}-${{ matrix.arch }}
          if-no-files-found: error
          retention-days: 30
